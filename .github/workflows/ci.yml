name: Data Engineering CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies for CI
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest pyspark==3.5.1
        # Install apache-airflow and docker provider for DAG syntax checking
        pip install apache-airflow==2.8.0 apache-airflow-providers-docker==3.9.0

    - name: Lint with Flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        
        # exit-zero treats all errors as warnings. Catch formatting issues.
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Validate Docker Compose
      run: |
        # docker-compose is usually pre-installed on GitHub ubuntu-latest runners
        # Validate the YAML file structure and syntax
        docker compose config --quiet

    - name: Run Automated Tests (Pytest)
      run: |
        # Run all test scenarios in the tests/ directory
        pytest tests/ -v
